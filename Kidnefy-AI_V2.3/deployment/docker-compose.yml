# ============================================
# Kidney Disease Prediction System
# Run with: docker compose up
# ============================================

services:
  api:
    build: .
    container_name: kidney-ai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./generated_reports:/app/generated_reports
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
